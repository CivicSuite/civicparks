<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">CivicParks architecture</title>
  <desc id="desc">CivicParks sits above CivicCore and supports parks policy, program, registration-link, and maintenance triage without processing payments or writing to registration systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fff2"/>
      <stop offset="1" stop-color="#fff7df"/>
    </linearGradient>
    <style>
      .box{fill:#fbfff8;stroke:#8fc77f;stroke-width:3;rx:24}
      .hard{fill:#fff7e4;stroke:#d9972b;stroke-width:3;rx:24}
      .text{font-family:Aptos,Segoe UI,sans-serif;fill:#162415}
      .title{font-size:28px;font-weight:800}
      .body{font-size:18px}
      .arrow{stroke:#397046;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#397046"/>
    </marker>
  </defs>
  <rect width="1100" height="520" fill="url(#bg)"/>
  <text x="55" y="62" class="text title">CivicParks v0.1.0</text>
  <text x="55" y="94" class="text body">Parks policy, program, registration-link, and maintenance triage</text>
  <rect x="55" y="140" width="240" height="120" class="box"/>
  <text x="83" y="180" class="text title">Parks staff</text>
  <text x="83" y="212" class="text body">Facility or program question</text>
  <text x="83" y="238" class="text body">Maintenance request</text>
  <rect x="400" y="105" width="310" height="210" class="box"/>
  <text x="430" y="150" class="text title">CivicParks API</text>
  <text x="430" y="185" class="text body">Cited policy answers</text>
  <text x="430" y="212" class="text body">Program answer drafts</text>
  <text x="430" y="239" class="text body">Registration-link guidance</text>
  <text x="430" y="266" class="text body">Maintenance triage</text>
  <rect x="805" y="110" width="240" height="95" class="box"/>
  <text x="835" y="150" class="text title">CivicCore</text>
  <text x="835" y="178" class="text body">Shared foundation</text>
  <rect x="805" y="250" width="240" height="140" class="hard"/>
  <text x="835" y="292" class="text title">Registration / Civic311</text>
  <text x="835" y="324" class="text body">Future connector design</text>
  <text x="835" y="350" class="text body">No v0.1.0 writes</text>
  <line x1="295" y1="200" x2="390" y2="200" class="arrow"/>
  <line x1="710" y1="165" x2="795" y2="157" class="arrow"/>
  <line x1="710" y1="252" x2="795" y2="306" class="arrow" stroke-dasharray="10 8"/>
  <rect x="55" y="340" width="655" height="110" class="hard"/>
  <text x="85" y="382" class="text title">Hard v0.1.0 Boundaries</text>
  <text x="85" y="414" class="text body">No payments, registrations, participant records, reservation writes, dispatch, connectors, or live LLM calls.</text>
</svg>
